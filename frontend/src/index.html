<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Трекер привычек</title>
    <link rel="stylesheet" href="/frontend/src/style.css">
    <link rel="manifest" href="/public/manifest.json">
</head>
<body>
    <div class="app-container">
        <!-- Верхняя навигация (вместо шапки) -->
        <div class="top-nav">
            <div class="nav-item active" onclick="switchTab('profile', event)">
                <span class="nav-icon">👤</span>
                <span class="nav-text">Профиль</span>
            </div>
            <div class="nav-item" onclick="switchTab('notes', event)">
                <span class="nav-icon">📝</span>
                <span class="nav-text">Заметки</span>
            </div>
            <div class="nav-item" onclick="switchTab('habits', event)">
                <span class="nav-icon">✓</span>
                <span class="nav-text">Привычки</span>
            </div>
            <div class="nav-item" onclick="switchTab('stats', event)">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Статистика</span>
            </div>
            <div class="nav-item" onclick="switchTab('settings', event)">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">Настройки</span>
            </div>
        </div>
<div class="app-container">
        <div class="app-content" id="app-content">
            <!-- Вкладка Профиль -->
            <div class="tab active" id="profile-tab">
                <div class="avatar-section">
                    <div class="avatar-container">
                        <div class="avatar" id="avatar-preview" onclick="document.getElementById('avatar-upload').click()">
                            <div class="avatar-placeholder">👤</div>
                        </div>
                        <input type="file" id="avatar-upload" accept="image/*" onchange="handleAvatarUpload(event)">
                        <button class="change-photo-btn" onclick="document.getElementById('avatar-upload').click()">Изменить фото</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="username" placeholder="Введите имя пользователя">
                </div>

                <div class="form-group">
                    <label>О себе</label>
                    <textarea id="bio" placeholder="Расскажите о себе..."></textarea>
                </div>

                <div class="form-group">
                    <label>День рождения</label>
                    <input type="date" id="birthdate" placeholder="Выберите дату вашего дня рождения" >
                </div>

                <button onclick="saveProfile()" style="margin-bottom: calc(100vw/24);">Сохранить изменения</button>
            </div>

            <!-- Вкладка Заметки -->
            <div class="tab" id="notes-tab">
                <div class="form-group">
                    <input type="text" id="note-title" placeholder="Заголовок">
                </div>

                <div class="form-group">
                    <textarea id="note-content" placeholder="Текст заметки..." onkeydown="handleTextareaKeydown(event)" style="font-size: calc(100vw/29);"></textarea>
                </div>

                <div class="list-type-selector">
                    <button class="list-type-btn" onclick="toggleListType('bulleted')" id="bulleted-btn">• Маркированный</button>
                    <button class="list-type-btn" onclick="toggleListType('numbered')" id="numbered-btn">1. Нумерованный</button>
                </div>

                <button onclick="addNote()" id="add-note-btn" style="margin-top: calc(100vw/24); margin-bottom: calc(100vw/24);">Добавить заметку</button>

                <div class="notes-list" id="notes-list">
                    <!-- Заметки будут добавляться сюда -->
                </div>
            </div>
            <!-- Вкладка Привычки -->
            <div class="tab" id="habits-tab">
                <div style="margin-bottom: clamp(15px, 3vh, 20px);">
                    <h2>Сегодня</h2>
                    <p id="current-date"></p>
                </div>

                <div class="habits-list" id="habits-list">
                    <!-- Привычки будут загружаться сюда -->
                </div>

                <button onclick="saveHabits()" style="margin: calc(100vw/24) 0 calc(100vw/24) 0;">Сохранить прогресс</button>
            </div>
            <!-- Вкладка Статистика -->
            <div class="tab" id="stats-tab">
                <div class="stats-header" style="display: flex; flex-direction: row; justify-content: space-between; gap: 10px;">
                    <div class="stat-card">
                        <div class="stat-value" id="streak-value">7</div>
                        <div class="stat-label">дней подряд</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-habits-value">5</div>
                        <div class="stat-label">всего привычек</div>
                    </div>
                </div>

                <div class="date-picker">
                    <label>Выберите день</label>
                    <input type="date" id="stats-date" onchange="loadDayStats()">
                </div>

                <div class="daily-habits-stats" id="daily-habits-stats">
                    <!-- Статистика привычек за выбранный день -->
                </div>

                <div class="day-notes">
                    <h3 id="selected-day-title" style="margin-bottom: calc(100vw / 30);">Заметки за день</h3>
                    <div id="day-notes-list">
                        <!-- Заметки за выбранный день -->
                    </div>

                    <div class="form-group" style="margin-top: clamp(10px, 2.5vh, 15px);">
                        <input type="text" id="new-day-note" placeholder="Новая заметка за этот день...">
                    </div>
                    <button onclick="addDayNote()" style="margin-bottom: calc(100vw/24);">Добавить заметку</button>
                </div>
            </div>
          <!-- Вкладка Настройки -->
          <div class="tab" id="settings-tab">
              <h2>Настройки</h2>

              <div class="settings-section">
                  <h3 style="font-size: clamp(16px, 3.5vw, 18vw); color: #333; margin-bottom: 15px;">Тема оформления</h3>

                  <div class="theme-selector">
                      <button class="theme-btn light-theme-btn active" onclick="changeTheme('light')">
                          <span class="theme-icon">☀️</span>
                          <span class="theme-label">Светлая</span>
                      </button>

                      <button class="theme-btn dark-theme-btn" onclick="changeTheme('dark')">
                          <span class="theme-icon">🌙</span>
                          <span class="theme-label" style="color: white;">Темная</span>
                      </button>
                  </div>
              </div>

              <div class="settings-section">
                  <h3 style="font-size: clamp(16px, 3.5vw, 18vw); color: #333; margin-bottom: 15px;">О приложении</h3>
                  <p style="color: #666; line-height: 1.5;">Версия 1.0.0</p>
                  <p style="color: #666; line-height: 1.5;">Трекер привычек помогает отслеживать ежедневные цели и прогресс</p>
              </div>
          </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
